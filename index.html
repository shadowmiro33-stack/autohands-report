<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AUTOHANDS Weekly Magazine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; }
        .magazine-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .hover-scale { transition: transform 0.3s ease; cursor: pointer; }
        .hover-scale:hover { transform: scale(1.02); }
        #article-modal { display: none; }
        #article-modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end border-b-4 border-black pb-4 mb-12">
            <div>
                <h2 class="text-blue-600 font-bold tracking-tighter uppercase text-sm">Autohands R&D Center</h2>
                <h1 class="text-4xl font-black italic">WEEKLY MAGAZINE</h1>
            </div>
            <div class="text-right flex flex-col items-end gap-2">
                <input type="date" id="date-picker" class="border-2 border-black rounded-lg px-2 py-1 font-bold text-sm" onchange="loadReport(this.value)">
                <p id="display-issue" class="font-bold text-lg text-blue-600"></p>
            </div>
        </header>

        <div id="magazine-content">
            </div>
    </div>

    <div id="article-modal" class="fixed inset-0 bg-black/80 z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl h-[90vh] rounded-3xl overflow-hidden flex flex-col">
            <div class="p-4 border-b flex justify-end"><button onclick="closeArticle()" class="bg-black text-white px-4 py-2 rounded-xl">닫기</button></div>
            <iframe id="article-frame" src="" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const blockedSites = ['naver.com', 'chosun.com', 'newsis.com', 'donga.com', 'yna.co.kr', 'edaily.co.kr'];

        function smartOpen(url) {
            if (blockedSites.some(site => url.includes(site))) {
                window.open(url, '_blank');
            } else {
                document.getElementById('article-frame').src = url;
                document.getElementById('article-modal').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeArticle() {
            document.getElementById('article-modal').classList.remove('active');
            document.getElementById('article-frame').src = "";
            document.body.style.overflow = 'auto';
        }

        function loadReport(date) {
            const data = archiveData[date];
            const content = document.getElementById('magazine-content');
            if(!data) {
                content.innerHTML = `<div class="py-20 text-center text-gray-400 font-bold text-xl">해당 날짜의 리포트가 없습니다.</div>`;
                return;
            }

            document.getElementById('display-issue').textContent = data.issue;
            content.innerHTML = `
                <section class="mb-16 bg-black rounded-3xl overflow-hidden p-8 text-white grid grid-cols-1 lg:grid-cols-3 gap-10 items-center">
                    <div class="lg:col-span-2 aspect-video rounded-2xl overflow-hidden">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${data.video.youtubeId}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div>
                        <span class="text-red-500 font-bold text-sm"><i class="fab fa-youtube mr-2"></i>MUST WATCH</span>
                        <h2 class="text-2xl font-black mt-4 mb-2">${data.video.title}</h2>
                        <p class="text-gray-400 text-sm">${data.video.desc}</p>
                    </div>
                </section>

                <section class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-20 items-center">
                    <div class="rounded-3xl overflow-hidden magazine-shadow hover-scale" onclick="smartOpen('${data.main.link}')">
                        <img src="${data.main.img}" class="w-full h-[400px] object-cover">
                    </div>
                    <div>
                        <h2 class="text-4xl font-black leading-tight mb-6">${data.main.title}</h2>
                        <p class="text-lg text-gray-600 mb-8">${data.main.desc}</p>
                        <button onclick="smartOpen('${data.main.link}')" class="font-bold border-b-2 border-black">본문 읽기 <i class="fas fa-arrow-right ml-2"></i></button>
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <div id="ai-list" class="space-y-8"></div>
                    <div id="auto-list" class="space-y-8"></div>
                </div>
            `;

            const renderItems = (items, id) => {
                document.getElementById(id).innerHTML = items.map(item => `
                    <div class="flex gap-4 group hover-scale" onclick="smartOpen('${item.link}')">
                        <img src="${item.img}" class="w-24 h-24 rounded-2xl object-cover magazine-shadow flex-shrink-0">
                        <div>
                            <span class="text-[10px] font-bold text-blue-600 uppercase">${item.cat || 'TECH'}</span>
                            <h4 class="font-bold text-lg group-hover:text-blue-600 leading-snug">${item.title}</h4>
                            <p class="text-sm text-gray-500 line-clamp-2 mt-1">${item.desc}</p>
                        </div>
                    </div>`).join('');
            };
            renderItems(data.ai, 'ai-list'); renderItems(data.auto, 'auto-list');
        }

        window.onload = () => {
            const today = "2026-03-30"; // 기본 로드 날짜
            document.getElementById('date-picker').value = today;
            loadReport(today);
        };
    </script>
</body>
</html>
