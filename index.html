<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AUTOHANDS Digital Magazine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="max-w-5xl mx-auto px-4 py-10">
        <div class="flex justify-between items-center mb-10 border-b-2 border-black pb-5">
            <h1 class="text-3xl font-black uppercase tracking-tighter">Autohands R&D</h1>
            <input type="date" id="date-picker" class="border p-2 rounded-lg font-bold shadow-sm" onchange="loadReport(this.value)">
        </div>

        <div id="content-view">
            </div>
    </div>

    <script src="data.js"></script>
    <script>
        // 유튜브 URL에서 ID 추출하는 자동화 함수
        function getYoutubeEmbed(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            const id = (match && match[2].length == 11) ? match[2] : null;
            return `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
        }

        function loadReport(date) {
            const data = archiveData[date];
            const view = document.getElementById('content-view');
            
            if(!data) {
                view.innerHTML = `<div class="text-center py-20 text-gray-400">새로운 기사가 없습니다.</div>`;
                return;
            }

            view.innerHTML = `
                <div class="bg-black aspect-video rounded-3xl overflow-hidden mb-10">
                    ${getYoutubeEmbed(data.video.url)}
                </div>
                
                <h2 class="text-2xl font-bold mb-5 text-blue-600">${data.issue}</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <section>
                        <h3 class="font-black text-xl mb-5 border-l-4 border-black pl-3 text-red-600">AI TECH (10)</h3>
                        <div id="ai-container" class="space-y-6"></div>
                    </section>
                    <section>
                        <h3 class="font-black text-xl mb-5 border-l-4 border-black pl-3 text-blue-600">AUTO PLATFORM (10)</h3>
                        <div id="auto-container" class="space-y-6"></div>
                    </section>
                </div>
            `;

            const renderList = (list, containerId) => {
                document.getElementById(containerId).innerHTML = list.map(item => `
                    <div class="p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer border" onclick="window.open('${item.link}')">
                        <p class="text-[10px] text-gray-400 font-bold">${item.source || 'News'}</p>
                        <h4 class="font-bold text-lg leading-tight mt-1">${item.title}</h4>
                        <p class="text-sm text-gray-500 mt-2 line-clamp-2">${item.desc}</p>
                    </div>
                `).join('');
            };

            renderList(data.ai, 'ai-container');
            renderList(data.auto, 'auto-container');
        }

        window.onload = () => {
            const today = "2026-03-30";
            document.getElementById('date-picker').value = today;
            loadReport(today);
        };
    </script>
</body>
</html>
