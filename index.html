<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오토핸즈 주간 리포트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; transition: background 0.3s; }
        .magazine-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .hover-scale { transition: transform 0.3s ease; cursor: pointer; }
        .hover-scale:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end border-b-4 border-black pb-4 mb-12">
            <div><h2 class="text-blue-600 font-bold tracking-tighter">AUTOHANDS R&D CENTER</h2><h1 class="text-4xl font-black italic">WEEKLY MAGAZINE</h1></div>
            <div class="text-right"><p id="display-issue" class="font-bold text-lg"></p><p id="display-date" class="text-gray-500 text-sm"></p></div>
        </header>
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-20 items-center">
            <div class="rounded-3xl overflow-hidden magazine-shadow hover-scale"><img id="main-img" src="" class="w-full h-[450px] object-cover"></div>
            <div><span class="bg-black text-white px-3 py-1 text-xs font-bold rounded mb-4 inline-block">HOT ISSUE</span>
                <h2 id="main-title" class="text-5xl font-black leading-tight mb-6"></h2><p id="main-desc" class="text-xl text-gray-600 leading-relaxed mb-8"></p>
                <a id="main-link" href="#" target="_blank" class="border-b-2 border-black font-bold pb-1 hover:text-blue-600 hover:border-blue-600 transition">READ MORE <i class="fas fa-arrow-right ml-2"></i></a>
            </div>
        </section>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
            <section><h3 class="text-2xl font-black mb-8 flex items-center gap-2"><i class="fas fa-microchip text-blue-500"></i> AI TECH</h3><div id="ai-list" class="space-y-10"></div></section>
            <section><h3 class="text-2xl font-black mb-8 flex items-center gap-2"><i class="fas fa-car text-blue-500"></i> AUTO TREND</h3><div id="auto-list" class="space-y-10"></div></section>
        </div>
    </div>
    <script src="data.js"></script>
    <script>
        window.onload = () => {
            document.getElementById('display-issue').textContent = reportData.issue;
            document.getElementById('display-date').textContent = reportData.date;
            document.getElementById('main-title').textContent = reportData.main.title;
            document.getElementById('main-desc').textContent = reportData.main.desc;
            document.getElementById('main-img').src = reportData.main.img;
            document.getElementById('main-link').href = reportData.main.link;
            const renderList = (data, containerId) => {
                document.getElementById(containerId).innerHTML = data.map(item => `
                    <div class="flex gap-4 group hover-scale" onclick="window.open('${item.link || '#'}', '_blank')">
                        <img src="${item.img}" class="w-24 h-24 rounded-2xl object-cover magazine-shadow">
                        <div>${item.cat ? `<span class="text-[10px] font-bold text-blue-500 uppercase">${item.cat}</span>` : ''}
                            <h4 class="font-bold text-lg group-hover:text-blue-600 leading-snug">${item.title}</h4><p class="text-sm text-gray-500 line-clamp-2 mt-1">${item.desc}</p>
                        </div>
                    </div>`).join('');
            };
            renderList(reportData.ai, 'ai-list'); renderList(reportData.auto, 'auto-list');
        };
    </script>
</body>
</html>
