<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오토핸즈 기술/업계 동향 매거진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; }
        .magazine-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .hover-scale { transition: transform 0.3s ease; cursor: pointer; }
        .hover-scale:hover { transform: scale(1.02); }
        #article-modal { transition: opacity 0.3s ease; display: none; }
        #article-modal.active { display: flex; opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end border-b-4 border-black pb-4 mb-12">
            <div><h2 class="text-blue-600 font-bold tracking-tighter">AUTOHANDS R&D CENTER</h2><h1 class="text-4xl font-black italic">WEEKLY MAGAZINE</h1></div>
            <div class="text-right"><p id="display-issue" class="font-bold text-lg"></p><p id="display-date" class="text-gray-500 text-sm"></p></div>
        </header>

        <section class="mb-20 bg-black rounded-3xl overflow-hidden p-8 text-white grid grid-cols-1 lg:grid-cols-3 gap-10 items-center">
            <div class="lg:col-span-2 aspect-video rounded-2xl overflow-hidden">
                <iframe id="video-frame" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div>
                <span class="text-red-500 font-bold text-sm tracking-widest"><i class="fab fa-youtube mr-2"></i>MUST WATCH</span>
                <h2 id="video-title" class="text-2xl font-black mt-4 mb-4"></h2>
                <p id="video-desc" class="text-gray-400 text-sm leading-relaxed mb-6"></p>
                <p id="video-source" class="text-xs text-gray-500"></p>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-20 items-center">
            <div class="rounded-3xl overflow-hidden magazine-shadow hover-scale" onclick="smartOpen(reportData.main.link)">
                <img id="main-img" src="" class="w-full h-[450px] object-cover">
            </div>
            <div>
                <span class="bg-black text-white px-3 py-1 text-xs font-bold rounded mb-4 inline-block">HEADLINE</span>
                <h2 id="main-title" class="text-5xl font-black leading-tight mb-6"></h2>
                <p id="main-desc" class="text-xl text-gray-600 leading-relaxed mb-8"></p>
                <button onclick="smartOpen(reportData.main.link)" class="border-b-2 border-black font-bold pb-1 hover:text-blue-600">READ FULL STORY <i class="fas fa-arrow-right ml-2"></i></button>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
            <section><h3 class="text-2xl font-black mb-8 border-b-2 border-gray-200 pb-2">AI TECHNOLOGY</h3><div id="ai-list" class="space-y-10"></div></section>
            <section><h3 class="text-2xl font-black mb-8 border-b-2 border-gray-200 pb-2">AUTO PLATFORM</h3><div id="auto-list" class="space-y-10"></div></section>
        </div>
    </div>

    <div id="article-modal" class="fixed inset-0 bg-black/80 z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl h-[90vh] rounded-3xl overflow-hidden flex flex-col relative">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <span class="text-xs font-bold text-gray-500">원문 리포트 보기</span>
                <button onclick="closeArticle()" class="w-10 h-10 flex items-center justify-center bg-black text-white rounded-full"><i class="fas fa-times"></i></button>
            </div>
            <iframe id="article-frame" src="" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // [분기처리] 아이프레임 차단 사이트 목록
        const blockedSites = ['naver.com', 'chosun.com', 'newsis.com', 'donga.com', 'yna.co.kr'];

        function smartOpen(url) {
            const isBlocked = blockedSites.some(site => url.includes(site));
            if (isBlocked) {
                window.open(url, '_blank'); // 보안 사이트는 새창
            } else {
                document.getElementById('article-frame').src = url;
                document.getElementById('article-modal').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeArticle() {
            document.getElementById('article-modal').classList.remove('active');
            document.getElementById('article-frame').src = "";
            document.body.style.overflow = 'auto';
        }

        window.onload = () => {
            if(typeof reportData === 'undefined') return;
            document.getElementById('display-issue').textContent = reportData.issue;
            document.getElementById('display-date').textContent = reportData.date;
            
            // Video Set
            document.getElementById('video-frame').src = `https://www.youtube.com/embed/${reportData.video.youtubeId}`;
            document.getElementById('video-title').textContent = reportData.video.title;
            document.getElementById('video-desc').textContent = reportData.video.desc;
            document.getElementById('video-source').textContent = `Source: ${reportData.video.source}`;

            document.getElementById('main-title').textContent = reportData.main.title;
            document.getElementById('main-desc').textContent = reportData.main.desc;
            document.getElementById('main-img').src = reportData.main.img;

            const renderList = (data, containerId) => {
                document.getElementById(containerId).innerHTML = data.map(item => `
                    <div class="flex gap-4 group hover-scale" onclick="smartOpen('${item.link}')">
                        <img src="${item.img}" class="w-28 h-28 rounded-2xl object-cover magazine-shadow flex-shrink-0 bg-gray-200">
                        <div class="flex-grow">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">${item.cat || 'TECH'}</span>
                                <span class="text-[10px] font-medium text-gray-400 italic">${item.source}</span>
                            </div>
                            <h4 class="font-bold text-lg group-hover:text-blue-600 leading-snug">${item.title}</h4>
                            <p class="text-sm text-gray-500 line-clamp-2 mt-1">${item.desc}</p>
                        </div>
                    </div>`).join('');
            };
            renderList(reportData.ai, 'ai-list'); renderList(reportData.auto, 'auto-list');
        };
    </script>
</body>
</html>
