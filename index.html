<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OASIS (오.아.시.스) - Autohands R&D Magazine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; word-break: keep-all; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hover-scale { transition: transform 0.3s ease; }
        .hover-scale:hover { transform: translateY(-4px); }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end border-b-4 border-black pb-5 mb-12">
            <div>
                <h2 class="text-blue-600 font-bold uppercase text-sm tracking-widest mb-1">Autohands R&D Center</h2>
                <div class="flex items-baseline gap-3">
                    <h1 class="text-5xl font-black tracking-tighter uppercase text-blue-900">OASIS</h1>
                    <span class="text-3xl font-bold text-gray-800 tracking-tight">오.아.시.스</span>
                </div>
                <p class="text-gray-500 font-medium mt-2 tracking-tight text-lg">
                    <i class="fas fa-quote-left text-gray-300 mr-2 text-sm"></i>오토핸즈가 아침에 시작하는 스마트 리포트
                </p>
            </div>
            <div class="text-right flex flex-col items-end gap-2">
                <input type="date" id="date-picker" class="border-2 border-black rounded-lg px-3 py-1.5 font-bold text-sm shadow-sm cursor-pointer hover:bg-gray-50" onchange="loadReport(this.value)">
                <p id="display-issue" class="font-bold text-lg text-blue-600"></p>
            </div>
        </header>

        <div id="magazine-content">
            <div class="py-20 text-center text-gray-400">
                <i class="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
                <p>데이터를 불러오는 중입니다...</p>
            </div>
        </div>
    </div>

    <script src="./data.js"></script>
    
    <script>
        function getYoutubeEmbed(url) {
            let id = '';
            if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
            else if (url.includes('v=')) id = url.split('v=')[1].split('&')[0];
            return `https://www.youtube.com/embed/${id}`;
        }

        function loadReport(date) {
            if (typeof archiveData === 'undefined') {
                document.getElementById('magazine-content').innerHTML = `
                    <div class="py-20 text-center border-2 border-dashed border-red-300 rounded-2xl bg-red-50">
                        <p class="text-red-500 font-bold text-lg mb-2">data.js 파일을 찾을 수 없습니다.</p>
                        <p class="text-gray-500 text-sm">index.html과 data.js가 같은 폴더에 있는지 확인해 주세요.</p>
                    </div>`;
                return;
            }

            const data = archiveData[date];
            const content = document.getElementById('magazine-content');
            
            if(!data) {
                content.innerHTML = `<div class="py-20 text-center text-gray-400 font-bold text-xl">${date} 리포트 데이터가 없습니다.</div>`;
                document.getElementById('display-issue').textContent = "NO DATA";
                return;
            }

            document.getElementById('display-issue').textContent = data.issue;
            
            content.innerHTML = `
                <section class="mb-16 bg-black rounded-3xl overflow-hidden p-8 text-white grid grid-cols-1 lg:grid-cols-3 gap-10 items-center shadow-lg">
                    <div class="lg:col-span-2 aspect-video rounded-2xl overflow-hidden bg-gray-900 shadow-2xl">
                        <iframe class="w-full h-full" src="${getYoutubeEmbed(data.video.url)}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div>
                        <span class="text-red-500 font-bold text-sm uppercase tracking-widest"><i class="fab fa-youtube mr-2"></i>${data.video.source}</span>
                        <h2 class="text-3xl font-black mt-4 mb-4 leading-tight">${data.video.title}</h2>
                        <p class="text-gray-400 text-sm leading-relaxed">${data.video.desc}</p>
                    </div>
                </section>

                <section class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-20 items-center">
                    <div class="rounded-3xl overflow-hidden shadow-xl cursor-pointer hover-scale" onclick="window.open('${data.main.link}')">
                        <img src="${data.main.img}" class="w-full h-[450px] object-cover bg-gray-200">
                    </div>
                    <div>
                        <span class="bg-blue-900 text-white px-3 py-1 text-xs font-bold rounded mb-4 inline-block tracking-widest">OASIS HEADLINE</span>
                        <h2 class="text-4xl font-black leading-tight mb-6 tracking-tighter">${data.main.title}</h2>
                        <p class="text-lg text-gray-600 mb-8 leading-relaxed">${data.main.desc}</p>
                        <button onclick="window.open('${data.main.link}')" class="font-bold text-lg border-b-2 border-black pb-1 hover:text-blue-600 hover:border-blue-600 transition">본문 읽기 →</button>
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <div>
                        <h3 class="text-2xl font-black mb-8 border-b-4 border-black pb-2 uppercase tracking-tighter">AI Technology</h3>
                        <div id="ai-list" class="space-y-6"></div>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black mb-8 border-b-4 border-black pb-2 uppercase tracking-tighter">Auto Platform</h3>
                        <div id="auto-list" class="space-y-6"></div>
                    </div>
                </div>
            `;

            const renderItems = (items, id) => {
                document.getElementById(id).innerHTML = items.map(item => `
                    <div class="flex gap-4 cursor-pointer group hover-scale bg-white p-3 rounded-2xl shadow-sm border border-gray-100" onclick="window.open('${item.link}')">
                        <img src="${item.img || 'https://via.placeholder.com/100'}" class="w-24 h-24 rounded-xl object-cover bg-gray-200 flex-shrink-0">
                        <div class="flex flex-col justify-center">
                            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">${item.source}</span>
                            <h4 class="font-bold text-lg group-hover:text-blue-600 leading-snug transition tracking-tight">${item.title}</h4>
                            <p class="text-sm text-gray-500 line-clamp-2 mt-1">${item.desc}</p>
                        </div>
                    </div>`).join('');
            };
            
            renderItems(data.ai, 'ai-list');
            renderItems(data.auto, 'auto-list');
        }

        window.onload = () => {
            const today = "2026-03-30"; 
            document.getElementById('date-picker').value = today;
            loadReport(today);
        };
    </script>
</body>
</html>
