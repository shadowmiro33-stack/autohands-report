<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AUTOHANDS Weekly Magazine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end border-b-4 border-black pb-4 mb-12">
            <div>
                <h2 class="text-blue-600 font-bold uppercase text-sm">Autohands R&D Center</h2>
                <h1 class="text-4xl font-black italic uppercase">Weekly Magazine</h1>
            </div>
            <div class="text-right flex flex-col items-end gap-2">
                <input type="date" id="date-picker" class="border-2 border-black rounded-lg px-2 py-1 font-bold text-sm" onchange="loadReport(this.value)">
                <p id="display-issue" class="font-bold text-lg text-blue-600"></p>
            </div>
        </header>

        <div id="magazine-content">
            <div class="py-20 text-center text-gray-400">데이터를 불러오는 중입니다...</div>
        </div>
    </div>

    <script src="./data.js"></script>
    
    <script>
        function getYoutubeEmbed(url) {
            let id = '';
            if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
            else if (url.includes('v=')) id = url.split('v=')[1].split('&')[0];
            return `https://www.youtube.com/embed/${id}`;
        }

        function loadReport(date) {
            // 전역 변수 archiveData가 있는지 체크
            if (typeof archiveData === 'undefined') {
                document.getElementById('magazine-content').innerHTML = `
                    <div class="py-20 text-center border-2 border-dashed border-red-300 rounded-2xl bg-red-50">
                        <p class="text-red-500 font-bold text-lg mb-2">data.js 파일을 찾을 수 없습니다.</p>
                        <p class="text-gray-500 text-sm">1. index.html과 data.js가 같은 폴더에 있는지 확인하세요.<br>2. 파일명이 정확히 data.js인지 확인하세요.</p>
                    </div>`;
                return;
            }

            const data = archiveData[date];
            const content = document.getElementById('magazine-content');
            
            if(!data) {
                content.innerHTML = `<div class="py-20 text-center text-gray-400 font-bold text-xl">${date} 리포트 데이터가 없습니다.</div>`;
                return;
            }

            document.getElementById('display-issue').textContent = data.issue;
            
            content.innerHTML = `
                <section class="mb-16 bg-black rounded-3xl overflow-hidden p-8 text-white grid grid-cols-1 lg:grid-cols-3 gap-10 items-center">
                    <div class="lg:col-span-2 aspect-video rounded-2xl overflow-hidden shadow-2xl">
                        <iframe class="w-full h-full" src="${getYoutubeEmbed(data.video.url)}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div>
                        <span class="text-red-500 font-bold text-sm uppercase"><i class="fab fa-youtube mr-2"></i>${data.video.source}</span>
                        <h2 class="text-2xl font-black mt-4 mb-2 leading-tight">${data.video.title}</h2>
                        <p class="text-gray-400 text-sm leading-relaxed">${data.video.desc}</p>
                    </div>
                </section>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-16" id="lists-area">
                    <div id="ai-list-wrap">
                        <h3 class="text-2xl font-black mb-8 border-b-2 pb-2">AI TECHNOLOGY</h3>
                        <div id="ai-list" class="space-y-8"></div>
                    </div>
                    <div id="auto-list-wrap">
                        <h3 class="text-2xl font-black mb-8 border-b-2 pb-2">AUTO PLATFORM</h3>
                        <div id="auto-list" class="space-y-8"></div>
                    </div>
                </div>
            `;
            // 이하 리스트 렌더링 함수 실행 (생략된 부분은 위와 동일)
            renderItems(data.ai, 'ai-list');
            renderItems(data.auto, 'auto-list');
        }

        function renderItems(items, id) {
            document.getElementById(id).innerHTML = items.map(item => `
                <div class="flex gap-4 cursor-pointer group" onclick="window.open('${item.link}')">
                    <img src="${item.img || 'https://via.placeholder.com/100'}" class="w-24 h-24 rounded-2xl object-cover bg-gray-200">
                    <div>
                        <span class="text-[10px] font-bold text-blue-600 uppercase">${item.source}</span>
                        <h4 class="font-bold text-lg group-hover:text-blue-600 leading-snug transition">${item.title}</h4>
                        <p class="text-sm text-gray-500 line-clamp-2 mt-1">${item.desc}</p>
                    </div>
                </div>`).join('');
        }

        window.onload = () => {
            const today = "2026-03-30"; 
            document.getElementById('date-picker').value = today;
            loadReport(today);
        };
    </script>
</body>
</html>
