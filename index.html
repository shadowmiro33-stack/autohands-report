    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; word-break: keep-all; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hover-scale { transition: transform 0.3s ease; }
        .hover-scale:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end border-b-4 border-black pb-4 mb-12">

                <h2 class="text-blue-600 font-bold uppercase text-sm">Autohands R&D Center</h2>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter">Weekly Magazine</h1>
            </div>
            <div class="text-right flex flex-col items-end gap-2">
                <input type="date" id="date-picker" class="border-2 border-black rounded-lg px-2 py-1 font-bold text-sm shadow-sm" onchange="loadReport(this.value)">
                <p id="display-issue" class="font-bold text-lg text-blue-600 tracking-tight"></p>
            </div>
        </header>

        <div id="magazine-content"></div>
    </div>

                ],
                auto: [
                    { cat: "Encar", title: "성수 팝업 '엔카라지' 성료", desc: "중고차 거래 전 과정을 오프라인 체험으로 풀어낸 혁신 사례입니다.", img: "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=400", link: "https://www.mk.co.kr/news/business/11997601", source: "매일경제" },
                    { cat: "K-Car", title: "4월 개인 직거래(C2C) 베타 오픈", desc: "직영 인프라를 개인 간 거래 시장으로 확장하여 유효 시장을 넓힙니다.", img: "https://dtd31o1ybbmk8.cloudfront.net/photos/12c9c849d7f9a747c11d310a3592f9f5/thumb.png", link: "https://www.digitaltoday.co.kr/news/articleView.html?idxno=646893", source: "디지털투데이" },
                    { cat: "Socar", title: "프리미엄 '블랙라벨' 100대 확충", desc: "수입차 라인업 확대로 법인 및 장거리 수요를 선점했습니다.", img: "https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=400", link: "https://platum.kr/archives/283833", source: "플래텀" },
                    { cat: "리본카", title: "RQI 리포트 투명 공개 전략", desc: "196가지 세부 점검 항목을 투명하게 고지하여 신뢰도를 높입니다.", img: "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=400", link: "https://biz.heraldcorp.com/article/10698220", source: "헤럴드경제" },
                    { cat: "차봇", title: "FT '아태 고성장 기업' 3년 연속 선정", desc: "국내 IT/SW 부문 15위에 오르며 강력한 성장성을 입증했습니다.", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=400", link: "https://v.daum.net/v/xLghLWzttd", source: "한스경제" },

                    { cat: "투루카", title: "주말 전 차종 50% 할인 공세", desc: "휴맥스 인프라를 활용해 점유율 확대를 꾀하고 있습니다.", img: "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=400", link: "https://www.digitaltoday.co.kr/news/articleView.html?idxno=642720", source: "디지털투데이" },
                    { cat: "Carwow", title: "영국 카와우 온라인 판매 채널 확대", desc: "온라인 플랫폼과 오프라인 딜러의 상생 모델을 구축했습니다.", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400", link: "https://www.carwow.co.uk/news", source: "Carwow News" }
                ]
            }
        };

        /** [LOGIC AREA] **/
        function getYoutubeEmbed(url) {
            let id = '';
            if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
            else if (url.includes('v=')) id = url.split('v=')[1].split('&')[0];
            return `https://www.youtube.com/embed/${id}`;
        }

        function loadReport(date) {
            const data = archiveData[date];
            const content = document.getElementById('magazine-content');
            
            if(!data) {
                content.innerHTML = `<div class="py-20 text-center text-gray-400 font-bold text-xl">해당 날짜(${date})의 데이터가 없습니다.</div>`;
                document.getElementById('display-issue').textContent = "NO DATA";
                return;
            }

            document.getElementById('display-issue').textContent = data.issue;
            
            content.innerHTML = `
                <section class="mb-16 bg-black rounded-3xl overflow-hidden p-8 text-white grid grid-cols-1 lg:grid-cols-3 gap-10 items-center">
                    <div class="lg:col-span-2 aspect-video rounded-2xl overflow-hidden bg-gray-900 shadow-2xl">
                        <iframe class="w-full h-full" src="${getYoutubeEmbed(data.video.url)}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div>
                        <span class="text-red-500 font-black text-sm uppercase tracking-widest"><i class="fab fa-youtube mr-2"></i>${data.video.source}</span>
                        <h2 class="text-3xl font-black mt-4 mb-4 leading-tight">${data.video.title}</h2>
                        <p class="text-gray-400 text-sm leading-relaxed">${data.video.desc}</p>
                    </div>
                </section>

                <section class="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-20 items-center">
                    <div class="rounded-3xl overflow-hidden shadow-2xl cursor-pointer hover-scale" onclick="window.open('${data.main.link}')">
                        <img src="${data.main.img}" class="w-full h-[450px] object-cover bg-gray-200">
                    </div>
                    <div>
                        <span class="bg-black text-white px-3 py-1 text-xs font-bold rounded mb-4 inline-block tracking-widest uppercase">Weekly Headline</span>
                        <h2 class="text-5xl font-black leading-tight mb-6 tracking-tighter">${data.main.title}</h2>
                        <p class="text-xl text-gray-600 mb-8 leading-relaxed">${data.main.desc}</p>
                        <button onclick="window.open('${data.main.link}')" class="font-black text-lg border-b-4 border-black pb-1 hover:text-blue-600 hover:border-blue-600 transition">READ FULL STORY →</button>
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <div><h3 class="text-2xl font-black mb-8 border-b-4 border-black pb-2 uppercase tracking-tighter">AI Technology</h3><div id="ai-list" class="space-y-10"></div></div>
                    <div><h3 class="text-2xl font-black mb-8 border-b-4 border-black pb-2 uppercase tracking-tighter">Auto Platform</h3><div id="auto-list" class="space-y-10"></div></div>
                </div>
            `;

            const renderItems = (items, id) => {
                document.getElementById(id).innerHTML = items.map(item => `
                    <div class="flex gap-5 cursor-pointer group hover-scale" onclick="window.open('${item.link}')">
                        <img src="${item.img || 'https://via.placeholder.com/150'}" class="w-28 h-28 rounded-2xl object-cover shadow-lg flex-shrink-0 bg-gray-200">
                        <div class="flex flex-col justify-center">
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">${item.cat || 'TECH'} | ${item.source}</span>
                            <h4 class="font-bold text-xl group-hover:text-blue-600 leading-snug transition">${item.title}</h4>
                            <p class="text-sm text-gray-500 line-clamp-2 mt-2 leading-relaxed">${item.desc}</p>
                        </div>
                    </div>`).join('');
            };
            renderItems(data.ai, 'ai-list'); renderItems(data.auto, 'auto-list');
        }

        window.onload = () => {
            const today = "2026-03-30"; 
            document.getElementById('date-picker').value = today;
            loadReport(today);
        };
    </script>
</body>
</html>
