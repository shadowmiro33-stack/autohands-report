<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OASIS (오.아.시.스) - Autohands R&D Magazine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; word-break: keep-all; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hover-scale { transition: transform 0.3s ease; }
        .hover-scale:hover { transform: translateY(-4px); }
        
        #article-modal { display: none; }
        #article-modal.active { display: flex; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end border-b-4 border-black pb-5 mb-12">
            <div>
                <h2 class="text-blue-600 font-bold uppercase text-sm tracking-widest mb-1">Autohands R&D Center</h2>
                <div class="flex items-baseline gap-3">
                    <h1 class="text-5xl font-black tracking-tighter uppercase text-blue-900">OASIS</h1>
                    <span class="text-3xl font-bold text-gray-800 tracking-tight">오.아.시.스</span>
                </div>
                <p class="text-gray-500 font-medium mt-2 tracking-tight text-lg">
                    <i class="fas fa-quote-left text-gray-300 mr-2 text-sm"></i>오토핸즈가 아침에 시작하는 스마트 리포트 (Beta)
                </p>
            </div>
            <div class="text-right flex flex-col items-end gap-2">
                <input type="date" id="date-picker" class="border-2 border-black rounded-lg px-3 py-1.5 font-bold text-sm shadow-sm cursor-pointer hover:bg-gray-50" onchange="loadReport(this.value)">
                <p id="display-issue" class="font-bold text-lg text-blue-600"></p>
            </div>
        </header>

        <div id="magazine-content">
            <div class="py-20 text-center text-gray-400">데이터 로드 중...</div>
        </div>
    </div>

    <div id="article-modal" class="fixed inset-0 bg-black/80 z-[100] items-center justify-center p-4" onclick="clickOutsideModal(event)">
        <div class="bg-white w-[95vw] max-w-[1600px] h-[95vh] rounded-2xl overflow-hidden flex flex-col relative shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-3 border-b flex justify-between items-center bg-gray-50">
                <span class="text-sm font-bold text-gray-600 ml-3">OASIS 원문 리포트 뷰어</span>
                <button type="button" onclick="closeArticle()" class="w-10 h-10 flex items-center justify-center bg-gray-200 text-gray-800 rounded-lg hover:bg-black hover:text-white transition">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <iframe id="article-frame" src="" class="w-full h-full border-none bg-white"></iframe>
            
            <div id="fallback-ui" class="w-full h-full flex flex-col items-center justify-center bg-gray-50 hidden">
                <i class="fas fa-shield-alt text-6xl text-gray-300 mb-6"></i>
                <h3 class="text-2xl font-black text-gray-800 mb-2">보안 정책이 적용된 언론사입니다</h3>
                <p class="text-gray-500 mb-8 text-center">해당 기사는 외부 뷰어를 차단하고 있습니다.<br>아래 버튼을 눌러 새 창에서 안전하게 읽어주세요.</p>
                <button type="button" id="fallback-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    새 창에서 기사 열기 <i class="fas fa-external-link-alt ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="./data.js"></script>
    
    <script>
        // 국내 주요 차단 언론사 리스트
        const blockedSites = [
            'naver.com', 'daum.net', 'chosun.com', 'joongang.co.kr', 'donga.com', 
            'mk.co.kr', 'hankyung.com', 'sedaily.com', 'fnnews.com', 'edaily.co.kr',
            'etnews.com', 'zdnet.co.kr', 'bloter.net', 'ddaily.co.kr', 'aitimes.com',
            'yna.co.kr', 'newsis.com', 'news1.kr', 'ajunews.com', 'bizwatch.co.kr',
            'motorgraph.com', 'autodiary.kr', 'carguy.kr', 'autotribune.co.kr'
        ];

        function smartOpen(url) {
            const isBlocked = blockedSites.some(site => url.includes(site));
            const modal = document.getElementById('article-modal');
            const frame = document.getElementById('article-frame');
            const fallback = document.getElementById('fallback-ui');
            const fallbackBtn = document.getElementById('fallback-btn');

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';

            if (isBlocked) {
                // 막힌 사이트: iframe 숨기고 중앙 가이드 버튼 노출
                frame.style.display = 'none';
                fallback.style.display = 'flex';
                fallbackBtn.onclick = () => { window.open(url, '_blank'); closeArticle(); };
            } else {
                // 열리는 사이트: iframe 노출하고 중앙 가이드 버튼 숨김
                frame.style.display = 'block';
                fallback.style.display = 'none';
                frame.src = url;
            }
        }

        function closeArticle() {
            document.getElementById('article-modal').classList.remove('active');
            document.getElementById('article-frame').src = "about:blank"; 
            document.body.style.overflow = 'auto';
        }

        function clickOutsideModal(event) {
            if (event.target.id === 'article-modal') {
                closeArticle();
            }
        }

        function getYoutubeEmbed(url) {
            let id = '';
            if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
            else if (url.includes('v=')) id = url.split('v=')[1].split('&')[0];
            return `https://www.youtube.com/embed/${id}`;
        }

        function loadReport(date) {
            const content = document.getElementById('magazine-content');

            if (typeof archiveData === 'undefined') {
                content.innerHTML = `
                    <div class="py-24 text-center">
                        <i class="fas fa-exclamation-triangle text-6xl text-red-200 mb-6"></i>
                        <h3 class="text-2xl font-black text-gray-800 mb-2">data.js 파일을 찾을 수 없습니다.</h3>
                        <p class="text-gray-500">index.html과 같은 폴더에 data.js가 있는지 확인해 주세요.</p>
                    </div>`;
                return;
            }

            const data = archiveData[date];
            
            if (!data) {
                content.innerHTML = `
                    <div class="py-24 text-center">
                        <i class="fas fa-newspaper text-6xl text-gray-200 mb-6"></i>
                        <h3 class="text-2xl font-black text-gray-400 mb-2">${date} 리포트가 아직 발행되지 않았습니다.</h3>
                        <p class="text-gray-400">우측 상단에서 날짜를 선택해 주세요.</p>
                    </div>`;
                document.getElementById('display-issue').textContent = "NO DATA";
                return;
            }

            document.getElementById('display-issue').textContent = data.issue;

            const mainInsightHtml = data.main.insight ? `
                <div class="mt-6 bg-blue-50/50 p-6 rounded-2xl border-l-4 border-blue-600">
                    <p class="text-sm font-black text-blue-900 mb-2"><i class="fas fa-lightbulb text-yellow-500 mr-2"></i>R&D 기술 고찰점</p>
                    <p class="text-sm text-gray-800 leading-relaxed font-medium">${data.main.insight}</p>
                </div>` : '';

            content.innerHTML = `
                <section class="mb-16 bg-black rounded-3xl overflow-hidden p-8 text-white grid grid-cols-1 lg:grid-cols-3 gap-10 items-center shadow-lg">
                    <div class="lg:col-span-2 aspect-video rounded-2xl overflow-hidden bg-gray-900 shadow-2xl">
                        <iframe class="w-full h-full" src="${getYoutubeEmbed(data.video.url)}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div>
                        <span class="text-red-500 font-bold text-sm uppercase tracking-widest"><i class="fab fa-youtube mr-2"></i>[${data.video.brand}] ${data.video.source}</span>
                        <h2 class="text-3xl font-black mt-4 mb-4 leading-tight">${data.video.title}</h2>
                        <p class="text-gray-400 text-sm leading-relaxed">${data.video.desc}</p>
                    </div>
                </section>

                <section class="mb-24">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                        <div class="rounded-3xl overflow-hidden shadow-xl cursor-pointer hover-scale" onclick="smartOpen('${data.main.link}')">
                            <img src="${data.main.img}" class="w-full h-[500px] object-cover bg-gray-200">
                        </div>
                        <div>
                            <span class="bg-blue-900 text-white px-3 py-1 text-xs font-bold rounded mb-4 inline-block tracking-widest">OASIS HEADLINE ${data.main.isImportant ? '🔥' : ''}</span>
                            <h2 class="text-4xl font-black leading-tight mb-6 tracking-tighter"><span class="text-blue-600">[${data.main.brand}]</span> ${data.main.title}</h2>
                            <p class="text-lg text-gray-600 mb-6 leading-relaxed">${data.main.desc}</p>
                            <button type="button" onclick="smartOpen('${data.main.link}')" class="font-bold text-lg border-b-2 border-black pb-1 hover:text-blue-600 transition">본문 읽기 →</button>
                            ${mainInsightHtml}
                        </div>
                    </div>
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <div>
                        <h3 class="text-3xl font-black mb-8 border-b-4 border-black pb-3 uppercase tracking-tighter">AI Technology</h3>
                        <div id="ai-list" class="space-y-6"></div>
                    </div>
                    <div>
                        <h3 class="text-3xl font-black mb-8 border-b-4 border-black pb-3 uppercase tracking-tighter">Auto Platform</h3>
                        <div id="auto-list" class="space-y-6"></div>
                    </div>
                </div>
            `;

            const renderItems = (items, id) => {
                document.getElementById(id).innerHTML = items.map(item => `
                    <div class="group bg-white rounded-3xl shadow-sm border border-gray-100 p-6 transition hover:shadow-lg">
                        <div class="flex gap-6 cursor-pointer items-center" onclick="smartOpen('${item.link}')">
                            <img src="${item.img || 'https://via.placeholder.com/150'}" class="w-28 h-28 rounded-2xl object-cover bg-gray-200 flex-shrink-0 shadow-sm">
                            <div class="flex flex-col justify-center flex-grow">
                                <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-2">
                                    ${item.isImportant ? '<span class="text-red-500 mr-1 font-black">🔥 중요</span> | ' : ''}
                                    ${item.source}
                                </span>
                                <h4 class="font-bold text-lg group-hover:text-blue-600 leading-snug transition tracking-tight">
                                    <span class="text-blue-600 mr-1">[${item.brand}]</span>${item.title}
                                </h4>
                                <p class="text-sm text-gray-500 line-clamp-2 mt-2">${item.desc}</p>
                            </div>
                        </div>
                        ${item.insight ? `
                        <div class="mt-5 bg-gray-50 p-4 rounded-2xl border-l-4 border-blue-400">
                            <p class="text-xs font-bold text-blue-800 mb-1">💡 R&D 기술 고찰점</p>
                            <p class="text-xs text-gray-700 leading-relaxed font-medium">${item.insight}</p>
                        </div>` : ''}
                    </div>`).join('');
            };
            
            renderItems(data.ai, 'ai-list');
            renderItems(data.auto, 'auto-list');
        }

        window.onload = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const today = `${year}-${month}-${day}`; 
            
            document.getElementById('date-picker').value = today;
            loadReport(today);
        };
    </script>
</body>
</html>
