name: final
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: update data
        run: |
          # 기존 data.js를 읽어와서 새 데이터를 추가한 후 다시 쓰는 방식입니다.
          # 차장님, 이 부분은 제가 내일부터는 파이썬 등을 써서 더 안전하게 처리해 드릴게요.
          # 일단은 오늘 복구한 data.js가 유지되도록 push 단계만 남겨두겠습니다.
          echo "Data Sync Start"
      - name: push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add data.js
          git commit -m "Keep History" || exit 0
          git push origin main
