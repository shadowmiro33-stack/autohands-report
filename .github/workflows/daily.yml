name: Daily Report Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update data.js
        run: |
          if [ ! -f data.js ]; then echo "var archiveData = {};" > data.js; fi
          cat <<EOT > today.js
    "2026-04-01": {
        "issue": "NO.34 (Netlify Live)",
        "main": { "brand": "현대차", "title": "현대차그룹, 2026년 전 차종 SDV 전환 및 OTA 기본화", "link": "https://www.autodaily.co.kr" },
        "ai": [], "auto": []
    },
EOT
          sed -i '/var archiveData = {/r today.js' data.js

      - name: Push to GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update" || exit 0
          git push origin main
