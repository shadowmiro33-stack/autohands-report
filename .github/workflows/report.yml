name: Daily Report Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update data.js
        run: |
          if [ ! -f data.js ]; then echo "var archiveData = {};" > data.js; fi
          cat <<EOT > today.js
    "2026-03-31": {
        "issue": "NO.33 (Manual Trigger)",
        "main": { "brand": "K-Car", "title": "케이카 C2C 정식 오픈 및 가치 제고 계획", "link": "https://www.kcar.com" },
        "ai": [], "auto": []
    },
EOT
          sed -i '/var archiveData = {/r today.js' data.js

      - name: Push to GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Report Update 2026-03-31" || exit 0
          git push
