name: Daily Report Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Netlify와의 정렬을 위해 전체 히스토리 가져오기
      
      - name: Update data.js
        run: |
          # data.js가 없으면 기본 구조 생성
          if [ ! -f data.js ]; then echo "var archiveData = {};" > data.js; fi
          
          # 4월 1일자 최신 데이터 (차장님 확정 구조)
          cat <<EOT > today.js
    "2026-04-01": {
        "issue": "NO.34 (Netlify Launch)",
        "main": { "brand": "현대차", "title": "현대차, 전 차종 OTA 기본 적용 및 SDV 전환 가속", "link": "https://www.autodaily.co.kr" },
        "ai": [
            { "brand": "OpenAI", "title": "기업용 GPT-5 파트너십 확대 발표", "link": "https://openai.com" }
        ],
        "auto": [
            { "brand": "인천항", "title": "중고차 수출 오토밸리 조성 가시화", "link": "https://www.kyeonggi.com" }
        ]
    },
EOT
          # data.js 상단에 오늘자 데이터 끼워넣기
          sed -i '/var archiveData = {/r today.js' data.js

      - name: Push to GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "Netlify Auto Update: 2026-04-01" || exit 0
          git push origin main
