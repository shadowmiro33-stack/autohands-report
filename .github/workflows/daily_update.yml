name: Daily Report Auto Update
on:
  schedule:
    - cron: '0 0 * * *' # 매일 아침 9시 (한국시간)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions: # 👈 이 부분이 핵심입니다! 설정과 별개로 코드에서도 쓰기 권한을 선언해야 합니다.
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # 최신 v4로 변경 (경고 해결)
      
      - name: Update data.js
        run: |
          # 오늘 날짜 데이터를 data.js에 삽입하는 임무 수행
          # 나중에는 차장님 니즈에 맞춰 뉴스 수집 로직을 여기 더 정교하게 넣어드릴게요!
          cat <<EOT > today_data.js
    "2026-03-31": {
        "issue": "2026 March-NO.33 (Official)",
        "video": { "brand": "모빌리티", "title": "독일 자동차의 몰락? 현실 분석", "url": "https://youtu.be/XLOKFPitTWw", "source": "유튜브" },
        "main": {
            "isImportant": true, "brand": "오픈AI", "title": "오픈AI, 기업용 에이전트 '스퍼드'에 집중", 
            "desc": "앤트로픽에 맞서 B2B 에이전트 모델 개발로 노선 전면 수정",
            "img": "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800",
            "link": "https://wowtale.net/2026/03/29/256251/", "source": "와우테일"
        },
        "ai": [
            { "brand": "MS", "title": "멀티 AI 에이전트 '카운슬' 도입", "desc": "AI들끼리 토론하고 검증하는 시스템", "link": "https://www.yna.co.kr/view/AKR20260331002400091", "source": "연합뉴스" }
        ],
        "auto": [
            { "brand": "수출동향", "title": "인천항 중고차 수출 물동량 비상", "desc": "중동 분쟁 여파로 해상 운임 급등", "link": "https://www.kedglobal.com/automobiles/newsView/ked202603300006", "source": "KED Global" }
        ]
    },
EOT
          # data.js 파일의 archiveData 시작 부분에 새 데이터를 끼워넣습니다.
          sed -i '/var archiveData = {/r today_data.js' data.js

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add data.js
          git commit -m "Auto Update: 2026-03-31 Report" || echo "No changes to commit"
          git push
